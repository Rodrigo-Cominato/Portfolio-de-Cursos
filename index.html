<body>

<div class="grain"></div>

<header class="hero">
  <div class="hero-inner">
    <p class="eyebrow">Cursos Realizados</p>
    <h1 id="nome-titulo" class="hero-title"></h1>
    <p id="subtitulo" class="hero-sub"></p>
    <div class="stats" id="stats"></div>
  </div>
</header>

<nav class="index-nav" id="index-nav" aria-label="Índice de instituições"></nav>

<main id="arquivo"></main>

<footer class="site-footer">
  <p>Catálogo atualizado em <span id="data-atual"></span></p>
</footer>

<script>
(function(){

  const arquivo = document.getElementById('arquivo');
  const indexNav = document.getElementById('index-nav');
  const statsEl = document.getElementById('stats');

  document.getElementById('nome-titulo').textContent = NOME;
  document.getElementById('subtitulo').textContent = SUBTITULO;

  const totalCursos = DADOS.reduce((acc, inst) => acc + inst.cursos.length, 0);
  const totalInstituicoes = DADOS.length;

  statsEl.innerHTML = `
    <div class="stat"><span class="stat-num">${totalCursos}</span><span class="stat-label">cursos</span></div>
    <div class="stat"><span class="stat-num">${totalInstituicoes}</span><span class="stat-label">instituições</span></div>
  `;

  function slug(str){
    return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-');
  }

  DADOS.forEach((inst, instIdx) => {
    const id = slug(inst.instituicao);

    // link no índice
    const navLink = document.createElement('a');
    navLink.href = `#${id}`;
    navLink.className = 'index-link';
    navLink.style.setProperty('--accent', inst.cor);
    navLink.innerHTML = `<span class="index-dot"></span>${inst.instituicao}`;
    indexNav.appendChild(navLink);

    // seção da instituição
    const section = document.createElement('section');
    section.className = 'drawer';
    section.id = id;
    section.style.setProperty('--accent', inst.cor);

    section.innerHTML = `
      <div class="drawer-header">
        <h2 class="drawer-title">${inst.instituicao}</h2>
        <span class="drawer-count">${inst.cursos.length} curso${inst.cursos.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="cards"></div>
    `;

    const cardsWrap = section.querySelector('.cards');
    inst.cursos.forEach((curso, cIdx) => {
      const card = document.createElement('article');
      card.className = 'card';
      card.innerHTML = `
        <h3 class="card-title">${curso.nome}</h3>
        <div class="card-meta">
          <span class="card-year">${curso.ano}</span>
        </div>
      `;
      cardsWrap.appendChild(card);
    });

    arquivo.appendChild(section);
  });

  document.getElementById('data-atual').textContent = new Date().toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

})();
</script>

<style>

  .eyebrow{

  }

  }

  /* ---------- INDEX NAV (catálogo) ---------- */
  .index-nav{
    display:flex; flex-wrap: wrap; gap: 0.6rem;
    max-width: 900px; margin: -1.5rem auto 0; padding: 1rem 1.5rem 2rem;
    justify-content:center;
    position: relative; z-index: 1;
  }
  .index-link{
    --accent: var(--accent-default);
    display:flex; align-items:center; gap:0.5rem;
    font-family:'JetBrains Mono', monospace; font-size: 0.78rem;
    color: var(--paper-dim);
    text-decoration:none;
    border: 1px solid var(--line);
    padding: 0.45rem 0.9rem 0.45rem 0.7rem;
    border-radius: 999px;
    transition: border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
    background: var(--bg-alt);
  }
  .index-link:hover{
    color: var(--paper);
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .index-dot{
    width:7px; height:7px; border-radius:50%;
    background: var(--accent);
    flex-shrink:0;
  }

  /* ---------- ARQUIVO / GAVETAS ---------- */
  main{ max-width: 900px; margin: 0 auto; padding: 1rem 1.5rem 4rem; position:relative; z-index:1; }

  .drawer{
    --accent: var(--accent-default);
    margin-top: 3rem;
    scroll-margin-top: 2rem;
  }

  .drawer-header{
    display:flex; align-items:baseline; gap: 0.9rem;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 0.7rem;
    margin-bottom: 1.4rem;
  }
  .drawer-title{
    font-family:'Fraunces', serif; font-weight:600;
    font-size: 1.5rem; margin:0; flex:1;
  }
  .drawer-count{
    font-family:'JetBrains Mono', monospace;
    font-size: 0.75rem; color: var(--paper-dim);
    white-space: nowrap;
  }

  .cards{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 0.9rem;
  }

  .card{
    --accent: inherit;
    background: var(--bg-alt);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent, var(--accent-default));
    border-radius: 6px;
    padding: 1rem 1.1rem;
    position: relative;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .drawer .card{ border-left-color: var(--accent); }
  .card:hover{ background: rgba(239,231,216,0.05); }

  .card-title{
    font-family:'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.98rem;
    margin: 0 0 0.7rem;
    color: var(--paper);
    line-height: 1.35;
  }
  .card-meta{
    display:flex; flex-wrap:wrap; gap: 0.5rem;
    font-family:'JetBrains Mono', monospace; font-size: 0.7rem;
  }
  .card-year{
    color: var(--paper-dim);
    padding: 0.15rem 0.2rem;
  }

  /* ---------- FOOTER ---------- */
  .site-footer{
    text-align:center; padding: 2.5rem 1.5rem 3rem;
    color: var(--paper-dim);
    font-family:'JetBrains Mono', monospace;
    font-size: 0.75rem;
    border-top: 1px solid var(--line);
  }

  @media (prefers-reduced-motion: reduce){
    .index-link{ transition:none; }
  }

  @media (max-width: 600px){
    .hero{ padding: 4.5rem 1.2rem 3rem; }
    .stats{ gap: 1.6rem; }
  }
</style>
</body>
